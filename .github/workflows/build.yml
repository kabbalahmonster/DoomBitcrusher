name: Build DoomBitcrusher

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libasound2-dev \
          libfreetype6-dev \
          libfontconfig1-dev \
          libx11-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxcursor-dev \
          libxext-dev \
          libgtk-3-dev \
          libwebkit2gtk-4.0-dev
    
    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: |
        cd build
        cmake --build . --config Release --parallel $(nproc)
    
    - name: Package
      run: |
        cd build
        mkdir -p DoomBitcrusher-Linux
        cp -r DoomBitcrusher_artefacts/Release/VST3/DoomBitcrusher.vst3 DoomBitcrusher-Linux/ 2>/dev/null || true
        cp DoomBitcrusher_artefacts/Release/Standalone/DoomBitcrusher DoomBitcrusher-Linux/ 2>/dev/null || true
        tar -czf DoomBitcrusher-Linux-x64.tar.gz DoomBitcrusher-Linux/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DoomBitcrusher-Linux-x64
        path: build/DoomBitcrusher-Linux-x64.tar.gz
    
    - name: Upload to release
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: build/DoomBitcrusher-Linux-x64.tar.gz
        tag_name: v1.0.${{ github.run_number }}
        name: DoomBitcrusher v1.0.${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2
    
    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64
    
    - name: Build
      run: |
        cd build
        cmake --build . --config Release --parallel
    
    - name: Package
      run: |
        cd build
        mkdir DoomBitcrusher-Windows
        xcopy /E /I DoomBitcrusher_artefacts\Release\VST3\DoomBitcrusher.vst3 DoomBitcrusher-Windows\DoomBitcrusher.vst3 2>nul || echo "VST3 not found"
        copy DoomBitcrusher_artefacts\Release\Standalone\DoomBitcrusher.exe DoomBitcrusher-Windows\ 2>nul || echo "Standalone not found"
        tar -czf DoomBitcrusher-Windows-x64.tar.gz DoomBitcrusher-Windows\
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DoomBitcrusher-Windows-x64
        path: build/DoomBitcrusher-Windows-x64.tar.gz
    
    - name: Upload to release
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: build/DoomBitcrusher-Windows-x64.tar.gz
        tag_name: v1.0.${{ github.run_number }}
        name: DoomBitcrusher v1.0.${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: |
        cd build
        cmake --build . --config Release --parallel $(sysctl -n hw.ncpu)
    
    - name: Package
      run: |
        cd build
        mkdir -p DoomBitcrusher-macOS
        cp -r DoomBitcrusher_artefacts/Release/VST3/DoomBitcrusher.vst3 DoomBitcrusher-macOS/ 2>/dev/null || true
        cp -r DoomBitcrusher_artefacts/Release/Standalone/DoomBitcrusher.app DoomBitcrusher-macOS/ 2>/dev/null || true
        tar -czf DoomBitcrusher-macOS-x64.tar.gz DoomBitcrusher-macOS/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DoomBitcrusher-macOS-x64
        path: build/DoomBitcrusher-macOS-x64.tar.gz
    
    - name: Upload to release
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: build/DoomBitcrusher-macOS-x64.tar.gz
        tag_name: v1.0.${{ github.run_number }}
        name: DoomBitcrusher v1.0.${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-fedora:
    runs-on: ubuntu-latest
    container: fedora:latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        dnf install -y \
          gcc-c++ \
          cmake \
          alsa-lib-devel \
          freetype-devel \
          fontconfig-devel \
          libX11-devel \
          libXrandr-devel \
          libXinerama-devel \
          libXcursor-devel \
          libXext-devel \
          gtk3-devel \
          webkit2gtk3-devel \
          git
    
    - name: Configure CMake
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: |
        cd build
        cmake --build . --config Release --parallel $(nproc)
    
    - name: Package
      run: |
        cd build
        mkdir -p DoomBitcrusher-Fedora
        cp -r DoomBitcrusher_artefacts/Release/VST3/DoomBitcrusher.vst3 DoomBitcrusher-Fedora/ 2>/dev/null || true
        cp DoomBitcrusher_artefacts/Release/Standalone/DoomBitcrusher DoomBitcrusher-Fedora/ 2>/dev/null || true
        tar -czf DoomBitcrusher-Fedora-x64.tar.gz DoomBitcrusher-Fedora/
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: DoomBitcrusher-Fedora-x64
        path: build/DoomBitcrusher-Fedora-x64.tar.gz
    
    - name: Upload to release
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: build/DoomBitcrusher-Fedora-x64.tar.gz
        tag_name: v1.0.${{ github.run_number }}
        name: DoomBitcrusher v1.0.${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
